<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Claude AI Sparkle - Official style sunburst -->
  <g transform="translate(50,50)">
    <!-- 12 petals radiating outward, rounded ends, warm terracotta/orange -->
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(0)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(30)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(60)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(90)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(120)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(150)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(180)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(210)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(240)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(270)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(300)"/>
    <rect x="-4" y="-44" width="8" height="26" rx="4" fill="#D97757" transform="rotate(330)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="12" fill="#D97757"/>
  </g>
</svg>
