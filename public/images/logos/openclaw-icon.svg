<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- OpenClaw mascot icon - red round character with antennae and cyan eyes -->
  <defs>
    <radialGradient id="body-grad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </radialGradient>
  </defs>
  <!-- Body - red circle -->
  <circle cx="50" cy="54" r="34" fill="url(#body-grad)"/>
  <!-- Left arm -->
  <ellipse cx="18" cy="54" rx="8" ry="7" fill="#E52020"/>
  <!-- Right arm -->
  <ellipse cx="82" cy="54" rx="8" ry="7" fill="#E52020"/>
  <!-- Left antenna -->
  <path d="M38 22 Q36 10 40 6" stroke="#CC0000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right antenna -->
  <path d="M62 22 Q64 10 60 6" stroke="#CC0000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left eye -->
  <circle cx="40" cy="48" r="5.5" fill="#0A0A0A"/>
  <circle cx="40" cy="48" r="4" fill="#00DDCC"/>
  <circle cx="41.5" cy="46.5" r="1.5" fill="white"/>
  <!-- Right eye -->
  <circle cx="60" cy="48" r="5.5" fill="#0A0A0A"/>
  <circle cx="60" cy="48" r="4" fill="#00DDCC"/>
  <circle cx="61.5" cy="46.5" r="1.5" fill="white"/>
  <!-- Feet -->
  <rect x="40" y="86" width="5" height="8" rx="2.5" fill="#CC0000"/>
  <rect x="55" y="86" width="5" height="8" rx="2.5" fill="#CC0000"/>
</svg>
